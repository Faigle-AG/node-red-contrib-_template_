<script type="text/javascript">
    RED.nodes.registerType('_template_', {
        category: 'function',
        color: '#a6bbcf',
        defaults: {
            name: { value: '' },
            enableLogging: { value: true },
            exampleIn: {
                value: '',
                validate: function (v) {
                    if (!v || v.trim() === '') return false;
                    var builtInValidator = RED.validators.typedInput('exampleInType');
                    return builtInValidator.call(this, v);
                },
            },
            exampleInType: { value: 'str' },
            exampleOut: {
                value: '',
                validate: function (v) {
                    if (!v || v.trim() === '') return false;
                    var builtInValidator = RED.validators.typedInput('exampleOutType');
                    return builtInValidator.call(this, v);
                },
            },
            exampleOutType: { value: 'msg' },
        },
        oneditprepare: function () {
            $('#node-input-exampleIn').typedInput({
                default: 'str',
                types: ['msg', 'flow', 'global', 'str', 'jsonata', 'env'],
                typeField: $('#node-input-exampleInType'),
            });
            $('#node-input-exampleOut').typedInput({
                default: 'msg',
                types: ['msg', 'flow', 'global'],
                typeField: $('#node-input-exampleOutType'),
            });
        },
        inputs: 1,
        outputs: 1,
        icon: 'font-awesome/fa-cog',
        label: function () {
            return this.name || '_template_';
        },
    });
</script>

<script type="text/markdown" data-help-name="_template_">
A custom node that reads a string, increments any trailing number, and writes the result to a specified output.

### Properties

- **Name** _string_ \
  The label of the node in the workspace.

- **Enable Logging** _boolean_ \
  If checked, logs the incoming `msg.payload` to the Node-RED debug console.

- **Example In** _string | msg | flow | global | jsonata | env_ \
  The source property containing the string to be evaluated (e.g., "name 1").

- **Example Out** _msg | flow | global_ \
  The destination property where the incremented string (e.g., "name 2") will be stored.

### Details

This node reads a value from the **Example In** configuration. If the retrieved value is a string ending with a number, it isolates the text, increments the number by 1, and saves the new string to the location defined by **Example Out**. The message is then passed to the output unmodified.
</script>
